on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      
      - name: Install requirements
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run lint
        run: bash scripts/lint.sh 

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      
      - name: Install requirements
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest app/tests -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      
      - name: Install requirements
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run tests
        run: echo "build_completed"
